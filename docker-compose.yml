version: "3.9"

# -------------------------------------------------------------------------
# Docker Compose - Infraestrutura Compjr
# Serviços:
#   app       → roda os testes (target: dev)
#   app-prod  → roda os testes (target: prod)  [profile: prod]
#   report    → serve o relatório HTML na porta 8080
#   ci        → simula a pipeline CI localmente [profile: ci]
# -------------------------------------------------------------------------

networks:
  app-network:
    driver: bridge

volumes:
  test-reports:
    driver: local

services:

  # ── Serviço testes em modo dev
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: runner
    container_name: jest-tests-dev
    environment:
      TARGET: dev
      NODE_ENV: development
      BASE_URL: https://reqres.in
      AUTH_EMAIL: eve.holt@reqres.in
      AUTH_PASSWORD: cityslicka
      DEBUG_REQUESTS: "false"
    volumes:
      # Monta relatórios no host para visualização
      - test-reports:/app/out/report
      - ./out/report:/app/out/report
    command: npm run test:dev
    networks:
      - app-network
    restart: "no"

  # ── Serviço testes em modo produção 
  app-prod:
    build:
      context: .
      dockerfile: Dockerfile
      target: runner
    container_name: jest-tests-prod
    profiles:
      - prod
    environment:
      TARGET: prod
      NODE_ENV: production
      BASE_URL: https://reqres.in
      AUTH_EMAIL: eve.holt@reqres.in
      AUTH_PASSWORD: cityslicka
      DEBUG_REQUESTS: "false"
    volumes:
      - ./out/report:/app/out/report
    command: npm run test:prod
    networks:
      - app-network
    restart: "no"

  # ── Servidor de report NGINX
  report:
    image: nginx:alpine
    container_name: jest-report-server
    profiles:
      - report
    ports:
      - "8080:80"
    volumes:
      - ./out/report:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app
    networks:
      - app-network
    restart: unless-stopped

  # ── CI local
  ci:
    build:
      context: .
      dockerfile: Dockerfile
      target: runner
    container_name: jest-ci-local
    profiles:
      - ci
    environment:
      TARGET: dev
      NODE_ENV: test
      BASE_URL: https://reqres.in
      AUTH_EMAIL: eve.holt@reqres.in
      AUTH_PASSWORD: cityslicka
      DEBUG_REQUESTS: "false"
    volumes:
      - ./out:/app/out
    # Roda testes e retorna exit code correto (para scripts de CI)
    command: >
      sh -c "
        echo '🚀 Iniciando pipeline CI local...' &&
        echo '📦 Dependências já instaladas na imagem' &&
        echo '🧪 Rodando testes...' &&
        npm run test:dev &&
        echo '✅ Todos os testes passaram!' ||
        (echo '❌ Testes falharam!' && exit 1)
      "
    networks:
      - app-network
    restart: "no"